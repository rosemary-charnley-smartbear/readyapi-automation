name: ReadyAPI Tests
on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Pull ReadyAPI Docker Image
        run: docker pull smartbear/ready-api-soapui-testrunner:latest
      
      - name: Run ReadyAPI Tests
        run: |
            docker run -v="${{ github.workspace }}/ReadyAPI-GitHub-Automation-readyapi-project.xml":/project \
            -v="${{ github.workspace }}/reports":/reports \
            -e LICENSE_SERVER="https://api.slm.manage.smartbear.com:443" \
            -e COMMAND_LINE="-f/%reports% '-RJUnit-Style HTML Report' -FHTML '-EDefault environment' '/%project%/ReadyAPI-GitHub-Automation-readyapi-project.xml'"

      - name: Publish Test Results
        uses: dorny/test-reporter@v1.9.1
        if: always()
        with:
          name: ReadyAPI Test Results
          path: reports/**/*.xml
          reporter: java-junit