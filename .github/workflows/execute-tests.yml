name: ReadyAPI Tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Pull ReadyAPI Docker Image
        run: docker pull smartbear/ready-api-soapui-testrunner:latest

      - name: Debug Workspace Contents
        run: ls -la ${{ github.workspace }}
      
      - name: Run ReadyAPI Tests
        run: |
          docker run \
            -v="${{ github.workspace }}/ReadyAPI-GitHub-Automation-readyapi-project.xml":/project \
            -v="${{ github.workspace }}/reports":/reports \
            -v="${{ github.workspace }}/ext":/ext \
            -e SLM_LICENSE_SERVER="https://manage.smartbear.com/" \
            -e API_KEY="${{ secrets.SMARTBEAR_API_KEY }}" \
            smartbear/ready-api-soapui-testrunner:latest \
